version: '3.8'
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: crimevista_db
    restart: always
    environment:
      POSTGRES_DB: crimevista
      POSTGRES_USER: crimevista_user
      POSTGRES_PASSWORD: crimevista_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crimevista_user -d crimevista"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
